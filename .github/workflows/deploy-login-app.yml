name: CI/CD pipeline

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Clone code
        uses: actions/checkout@v3

      - name: Build the image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/login-app .

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push the image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/login-app

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Pull the Image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/login-app

      - name: Stop old container
        run: docker stop login-app || true && docker rm login-app || true

      - name: Run Container
        run: docker run -d -p 3000:3000 --name login-app ${{ secrets.DOCKER_USERNAME }}/login-app
